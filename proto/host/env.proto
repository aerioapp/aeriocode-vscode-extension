syntax = "proto3";

package host;
option java_package = "bot.aeriocode.host.proto";
option java_multiple_files = true;

import "aeriocode/common.proto";

// Provides methods for working with the user's environment.
service EnvService {
  // Writes text to the system clipboard.
  rpc clipboardWriteText(aeriocode.StringRequest) returns (aeriocode.Empty);

  // Reads text from the system clipboard.
  rpc clipboardReadText(aeriocode.EmptyRequest) returns (aeriocode.String);
}
